<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Private Flight Booking Status</title><style>
:root{--live:#66ff99}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#000;color:#f2f2f2;font-family:"Courier New",monospace;padding:18px;display:grid;place-items:center}.frame{width:min(680px,100%);border:2px solid #fff;padding:18px;background:#000}.title{font-size:clamp(24px,6vw,38px);font-weight:700}.sub,.note{color:#aaa;font-size:12px;line-height:1.45;text-transform:uppercase}.sub{margin:7px 0 18px}.form{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{font-size:12px;text-transform:uppercase;color:#ccc}input{width:100%;min-height:48px;margin-top:6px;border:1px solid #fff;background:#050505;color:#fff;padding:10px;font:15px "Courier New",monospace}button{grid-column:1/-1;min-height:52px;border:2px solid #fff;background:#d0d0d0;color:#000;font:700 15px "Courier New",monospace;text-transform:uppercase;cursor:pointer}.result{display:none;margin-top:16px;border:1px solid var(--live);padding:12px}.result.show{display:block}.result.error{border-color:#ff6b6b;color:#ffb0b0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.item{border:1px solid #555;padding:9px;font-size:12px;text-transform:uppercase}.item span{display:block;color:#999;font-size:10px;margin-bottom:5px}.item strong{color:#fff;line-height:1.3}.status{color:var(--live)}@media(max-width:560px){.form,.grid{grid-template-columns:1fr}}
</style></head><body><main class="frame"><div class="title">PRIVATE FLIGHT STATUS</div><p class="sub">Enter the booking reference and the email used for the request.</p><form id="lookup" class="form"><label>Booking reference<input id="reference" required placeholder="HYV-HNK-001" autocomplete="off" /></label><label>Email address<input id="email" type="email" required placeholder="you@example.com" autocomplete="email" /></label><button>View booking</button></form><div id="result" class="result" aria-live="polite"></div><p class="note">For privacy, both the booking reference and lead traveller email are required.</p></main><script>const f=document.querySelector('#lookup'),r=document.querySelector('#result');const e=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));f.addEventListener('submit',async x=>{x.preventDefault();r.className='result show';r.textContent='Loading booking...';const q=new URLSearchParams({reference:document.querySelector('#reference').value,email:document.querySelector('#email').value});const res=await fetch('/api/booking-status?'+q,{cache:'no-store'});const d=await res.json().catch(()=>({}));if(!res.ok){r.className='result show error';r.textContent=d.error||'Unable to find this booking.';return}const b=d.booking;r.className='result show';r.innerHTML=`<div class="grid"><div class="item"><span>Reference</span><strong>${e(b.reference)}</strong></div><div class="item"><span>Status</span><strong class="status">${e(b.status)}</strong></div><div class="item"><span>Route</span><strong>${e(b.route)}</strong></div><div class="item"><span>Departure</span><strong>${e(b.departure)}</strong></div><div class="item"><span>Pilot decision</span><strong>${e(b.pilotDecision)}</strong></div><div class="item"><span>Payment</span><strong>${e(b.paymentStatus)}</strong></div><div class="item"><span>Travellers</span><strong>${e(b.passengers)} PAX</strong></div><div class="item"><span>Seat preference</span><strong>${e(b.seatPreference)}</strong></div></div>`});</script></body></html>
