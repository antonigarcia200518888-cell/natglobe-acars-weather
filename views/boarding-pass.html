<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#16125e" />
  <title>Private Flight Boarding Pass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    @font-face { font-family: "Computer Says No"; src: url('/fonts/computer-says-no.woff2') format('woff2'); font-display: swap; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 28px; background: #11121a; font-family: Arial, Helvetica, sans-serif; }
    .shell { width: min(1280px, 100%); }
    .heading { margin: 0 0 12px; color: rgba(255,255,255,.82); font: 600 13px/1.4 Poppins, Arial, sans-serif; letter-spacing: .08em; text-transform: uppercase; }
    .ticket { position: relative; width: 100%; aspect-ratio: 2000 / 647; background: url('/boarding-pass-template-clean.png') center / 100% 100% no-repeat; box-shadow: 0 28px 80px rgba(0,0,0,.42); overflow: hidden; }
    .field { position: absolute; display: flex; align-items: center; overflow: hidden; color: #050505; font-family: "Computer Says No", "Courier New", monospace; font-weight: 400; line-height: 1; text-transform: uppercase; white-space: nowrap; }
    .paper { background: transparent; }
    .stub { color: #fff; background: transparent; }
    .passenger { left: 2.4%; top: 19.7%; width: 46%; height: 12.7%; font-size: clamp(18px, 4.1vw, 66px); }
    .from { left: 2.4%; top: 49.2%; width: 25.8%; height: 12.7%; font-size: clamp(16px, 3.7vw, 60px); }
    .date { left: 32.1%; top: 49.2%; width: 18.8%; height: 12.7%; font-size: clamp(16px, 3.45vw, 56px); }
    .aircraft { left: 54%; top: 49.2%; width: 14%; height: 12.7%; font-size: clamp(14px, 2.85vw, 47px); }
    .to { left: 2.4%; top: 78.9%; width: 25.8%; height: 12.7%; font-size: clamp(16px, 3.7vw, 60px); }
    .boarding { left: 32.1%; top: 78.9%; width: 18.8%; height: 12.7%; font-size: clamp(16px, 3.45vw, 56px); }
    .flight-time { left: 54%; top: 78.9%; width: 14%; height: 12.7%; font-size: clamp(14px, 2.85vw, 47px); }
    .qr-wrap { position: absolute; left: 80.7%; top: 18.5%; width: 10.2%; aspect-ratio: 1; padding: .45%; }
    .qr { display: block; width: 100%; height: 100%; }
    .stub-name { left: 73.7%; top: 52.4%; width: 23.5%; height: 7%; justify-content: center; text-align: center; font-size: clamp(14px, 2.05vw, 34px); }
    .passport { left: 73.7%; top: 71.2%; width: 13%; height: 5.4%; font-size: clamp(10px, 1.55vw, 26px); }
    .dob { left: 88%; top: 71.2%; width: 8%; height: 5.4%; font-size: clamp(9px, 1.2vw, 20px); }
    .departure { left: 73.7%; top: 87%; width: 10%; height: 5.2%; font-size: clamp(10px, 1.5vw, 25px); }
    .arrival { left: 88%; top: 87%; width: 8%; height: 5.2%; font-size: clamp(10px, 1.5vw, 25px); }
    .error { max-width: 620px; padding: 30px; border: 1px solid rgba(255,255,255,.25); color: #fff; font: 16px/1.5 "Courier New", monospace; }
    @media (max-width: 680px) { body { display: block; padding: 0; background: #11121a; } .heading { margin: 16px; } .shell { width: 100%; overflow-x: auto; } .ticket { width: 760px; margin: 0 auto 18px; } }
  </style>
</head>
<body>
  <main class="shell">
    <p class="heading">Private Flight / Passenger Information Pass</p>
    <section id="ticket" class="ticket" hidden aria-label="Private flight boarding pass">
      <div id="passenger" class="field paper passenger">Private guest</div>
      <div id="from" class="field paper from">Departure</div>
      <div id="date" class="field paper date">Date</div>
      <div id="aircraft" class="field paper aircraft">PA28-200R</div>
      <div id="to" class="field paper to">Arrival</div>
      <div id="boarding" class="field paper boarding">Boarding</div>
      <div id="flightTime" class="field paper flight-time">00H 00M</div>
      <div class="qr-wrap"><img id="qr" class="qr" alt="Boarding pass QR code" /></div>
      <div id="stubName" class="field stub stub-name">Private guest</div>
      <div id="passport" class="field stub passport">PPT/VERIFIED</div>
      <div id="dob" class="field stub dob">VERIFIED</div>
      <div id="departure" class="field stub departure">00:00</div>
      <div id="arrival" class="field stub arrival">00:00</div>
    </section>
    <div id="error" class="error" hidden>This boarding pass is not available.</div>
  </main>
  <script>
    const token = location.pathname.split('/').filter(Boolean).pop();
    const set = (id, value) => document.getElementById(id).textContent = value || 'TBD';
    fetch(`/api/boarding-passes/${encodeURIComponent(token)}`, { cache: 'no-store' })
      .then(res => res.ok ? res.json() : Promise.reject())
      .then(({ pass }) => {
        set('passenger', pass.passenger); set('stubName', pass.passenger); set('from', pass.from); set('to', pass.to); set('date', pass.date); set('boarding', pass.boardingTime); set('flightTime', pass.flightTime); set('aircraft', 'PA28-200R'); set('passport', pass.passport); set('dob', pass.dob); set('departure', pass.departureTime); set('arrival', pass.arrivalTime); document.getElementById('qr').src = `/api/boarding-passes/${encodeURIComponent(token)}/qr`; document.title = `${pass.reference} / Private Flight`; document.getElementById('ticket').hidden = false;
      })
      .catch(() => { document.getElementById('error').hidden = false; });
  </script>
</body>
</html>
