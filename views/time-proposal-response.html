<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Private Flight Time Proposal</title>
  <style>
    @font-face { font-family: 'Computer Says No'; src: url('/fonts/computer-says-no.woff2') format('woff2'); font-weight: 700; font-style: normal; }
    :root { --bg:#050608; --panel:#0b0d10; --line:#d7d7d7; --text:#f5f5f5; --muted:#a9adb2; --green:#56d27b; --red:#ff625c; --navy:#031c45; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background: radial-gradient(circle at top, #15181d 0, var(--bg) 48%, #000 100%); color:var(--text); font-family:"Courier New", monospace; display:flex; align-items:center; justify-content:center; padding:22px; }
    main { width:min(760px, 100%); border:2px solid var(--line); background:rgba(8,10,13,.94); padding:22px; box-shadow:0 24px 70px rgba(0,0,0,.45); }
    img { display:block; width:138px; height:auto; margin:0 0 18px; background:#fff; padding:6px; }
    .eyebrow { color:var(--green); font-size:12px; letter-spacing:.12em; text-transform:uppercase; }
    h1 { margin:10px 0 18px; font-family:"Computer Says No","Courier New",monospace; font-size:clamp(28px, 7vw, 48px); line-height:.95; text-transform:uppercase; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:18px 0; }
    .item { border:1px solid rgba(255,255,255,.45); padding:12px; min-height:76px; }
    .item span { display:block; color:var(--muted); font-size:11px; text-transform:uppercase; margin-bottom:7px; }
    .item strong { display:block; font-size:15px; line-height:1.35; text-transform:uppercase; }
    .full { grid-column:1 / -1; }
    .choice { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:18px 0 12px; }
    .choice button { border:1px solid var(--line); color:var(--text); background:transparent; padding:14px 12px; font:700 14px "Courier New",monospace; cursor:pointer; }
    .choice button.selected.accept { border-color:var(--green); color:var(--green); box-shadow:0 0 0 1px var(--green) inset; }
    .choice button.selected.deny { border-color:var(--red); color:var(--red); box-shadow:0 0 0 1px var(--red) inset; }
    label { display:block; color:var(--muted); font-size:12px; text-transform:uppercase; margin:14px 0 8px; }
    textarea { width:100%; min-height:120px; resize:vertical; border:1px solid var(--line); background:#030405; color:var(--text); padding:12px; font:14px "Courier New",monospace; }
    .submit { width:100%; margin-top:14px; border:1px solid var(--green); background:var(--green); color:#00180a; padding:15px; font:700 15px "Courier New",monospace; cursor:pointer; }
    .status { margin-top:14px; border:1px solid rgba(255,255,255,.4); padding:12px; color:var(--muted); line-height:1.5; }
    .status.good { border-color:var(--green); color:var(--green); }
    .status.bad { border-color:var(--red); color:var(--red); }
    @media (max-width:620px) { body { padding:12px; align-items:flex-start; } main { padding:16px; } .grid, .choice { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <img src="/nga-private-aviation-logo.png" alt="NGA Private Aviation" />
    <div class="eyebrow">Private Flight Schedule Review</div>
    <h1>New Departure Time</h1>
    <div id="details" class="grid">
      <div class="item full"><span>Status</span><strong>Loading proposal...</strong></div>
    </div>
    <div class="choice">
      <button id="acceptBtn" class="accept" type="button">ACCEPT NEW TIME</button>
      <button id="denyBtn" class="deny" type="button">DECLINE NEW TIME</button>
    </div>
    <label for="message">Message to operations</label>
    <textarea id="message" placeholder="Optional message, timing note, or reason if you cannot accept this departure time."></textarea>
    <button id="submitBtn" class="submit" type="button">SEND RESPONSE</button>
    <div id="status" class="status">Please review the proposed time and send your response.</div>
  </main>
  <script>
    const details = document.getElementById('details');
    const statusBox = document.getElementById('status');
    const message = document.getElementById('message');
    const acceptBtn = document.getElementById('acceptBtn');
    const denyBtn = document.getElementById('denyBtn');
    const submitBtn = document.getElementById('submitBtn');
    const parts = location.pathname.split('/').filter(Boolean);
    const reference = parts[1] || '';
    const token = parts[2] || '';
    let decision = (parts[3] || '').toLowerCase() === 'deny' ? 'DENIED' : 'ACCEPTED';

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
    }

    function setDecision(next) {
      decision = next;
      acceptBtn.classList.toggle('selected', decision === 'ACCEPTED');
      denyBtn.classList.toggle('selected', decision === 'DENIED');
    }

    function renderProposal(proposal) {
      details.innerHTML = `
        <div class="item full"><span>Reference</span><strong>${escapeHtml(proposal.reference)}</strong></div>
        <div class="item full"><span>Route</span><strong>${escapeHtml(proposal.route)}</strong></div>
        <div class="item"><span>Current requested departure</span><strong>${escapeHtml(proposal.currentDate)} ${escapeHtml(proposal.currentTime)}</strong></div>
        <div class="item"><span>Proposed new departure</span><strong>${escapeHtml(proposal.proposedLabel)}</strong></div>
        <div class="item full"><span>Operations note</span><strong>${escapeHtml(proposal.note || 'Operational timing adjustment')}</strong></div>
        <div class="item full"><span>Response status</span><strong>${escapeHtml(proposal.responseStatus || 'PENDING')}</strong></div>
      `;
      if (proposal.responseMessage) message.value = proposal.responseMessage;
      statusBox.textContent = proposal.responseStatus && proposal.responseStatus !== 'PENDING'
        ? `Current recorded response: ${proposal.responseStatus}. You may send an updated response if needed.`
        : 'Please review the proposed time and send your response.';
    }

    async function loadProposal() {
      const res = await fetch(`/api/private-flight-time-proposals/${encodeURIComponent(reference)}/${encodeURIComponent(token)}`, { cache: 'no-store' });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        details.innerHTML = '<div class="item full"><span>Status</span><strong>Proposal not available</strong></div>';
        statusBox.textContent = data.error || 'This time proposal link is not available.';
        statusBox.className = 'status bad';
        submitBtn.disabled = true;
        return;
      }
      renderProposal(data.proposal);
    }

    acceptBtn.addEventListener('click', () => setDecision('ACCEPTED'));
    denyBtn.addEventListener('click', () => setDecision('DENIED'));
    submitBtn.addEventListener('click', async () => {
      submitBtn.disabled = true;
      statusBox.textContent = 'Sending response...';
      statusBox.className = 'status';
      const res = await fetch(`/api/private-flight-time-proposals/${encodeURIComponent(reference)}/${encodeURIComponent(token)}/respond`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ decision, message: message.value.trim() })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        statusBox.textContent = data.error || 'Unable to send response.';
        statusBox.className = 'status bad';
        submitBtn.disabled = false;
        return;
      }
      statusBox.textContent = decision === 'ACCEPTED'
        ? `Thank you. The proposed departure time has been accepted for ${data.reference}.`
        : `Thank you. Your decline has been sent to operations for ${data.reference}.`;
      statusBox.className = decision === 'ACCEPTED' ? 'status good' : 'status bad';
      await loadProposal();
      submitBtn.disabled = false;
    });

    setDecision(decision);
    loadProposal();
  </script>
</body>
</html>
