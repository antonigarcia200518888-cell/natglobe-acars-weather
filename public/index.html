<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NatGlobe ACARS Weather</title>

  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 90%;
      max-width: 600px;
      border: 1px solid #fff;
      padding: 24px;
      background: #000;
    }

    h1 {
      margin: 0 0 20px 0;
      text-align: center;
      font-size: 22px;
      color: #c0c0c0;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 20px;
      font-family: "Courier New", monospace;
      background: #000;
      color: #fff;
      border: 1px solid #fff;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      font-family: "Courier New", monospace;
      font-weight: bold;
      background: #c0c0c0;
      color: #000;
      border: 1px solid #fff;
      margin-bottom: 12px;
    }

    .actions {
      display: none;
      gap: 10px;
      margin-top: 10px;
    }

    .actions a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      padding: 12px;
      border: 1px solid #fff;
      color: #fff;
      background: #000;
      font-weight: bold;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      min-height: 20px;
    }

    .preview {
      margin-top: 15px;
      text-align: center;
    }

    .preview img {
      max-width: 100%;
      border: 1px solid #fff;
      background: #fff;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>NATGLOBE AVIATION<br>ACARS WEATHER</h1>

    <input id="icao" placeholder="EFHK" maxlength="4" value="EFHK">

    <button id="btn">GENERATE WEATHER</button>

    <div class="actions" id="actions">
      <a id="download" download>DOWNLOAD PNG</a>
      <a id="open" target="_blank">OPEN PNG</a>
    </div>

    <div class="status" id="status"></div>
    <div class="preview" id="preview"></div>
  </div>

  <script>
    async function clearCache() {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const reg of regs) {
          await reg.unregister();
        }
      }

      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
    }

    const btn = document.getElementById('btn');
    const input = document.getElementById('icao');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');
    const actions = document.getElementById('actions');
    const download = document.getElementById('download');
    const open = document.getElementById('open');

    function setStatus(text) {
      status.textContent = text;
    }

    function showImage(icao, blob) {
      const url = URL.createObjectURL(blob);

      preview.innerHTML = `<img src="${url}">`;

      download.href = url;
      download.download = `${icao}_ACARS_WEATHER.png`;

      open.href = url;

      actions.style.display = 'flex';
    }

    async function generate() {
      const icao = input.value.trim().toUpperCase();

      if (!/^[A-Z]{4}$/.test(icao)) {
        setStatus('INVALID ICAO');
        return;
      }

      setStatus('FETCHING WEATHER...');
      preview.innerHTML = '';
      actions.style.display = 'none';

      try {
        const res = await fetch(`/api/weather-v2?icao=${icao}&t=${Date.now()}`, {
          cache: 'no-store'
        });

        if (!res.ok) throw new Error();

        const blob = await res.blob();

        showImage(icao, blob);
        setStatus('READY');
      } catch {
        setStatus('ERROR FETCHING WEATHER');
      }
    }

    btn.onclick = generate;
    input.onkeydown = e => {
      if (e.key === 'Enter') generate();
    };

    clearCache();
  </script>
</body>
</html>
