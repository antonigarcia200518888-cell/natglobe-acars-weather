<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NatGlobe ACARS Weather</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: "Courier New", Courier, monospace;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 90%;
      max-width: 520px;
      text-align: center;
    }

    .title {
      color: #c0c0c0;
      font-family: "Courier New", Courier, monospace;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .icao {
      width: 100%;
      box-sizing: border-box;
      background: #000;
      color: #fff;
      border: 1px solid #fff;
      padding: 14px;
      font-size: 22px;
      font-family: "Courier New", Courier, monospace;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 14px;
      outline: none;
    }

    .btn {
      width: 100%;
      box-sizing: border-box;
      background: #c0c0c0;
      color: #000;
      border: 1px solid #fff;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
      font-family: "Courier New", Courier, monospace;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .status {
      min-height: 20px;
      margin: 12px 0 18px 0;
      font-size: 14px;
      font-family: "Courier New", Courier, monospace;
      text-transform: uppercase;
      color: #fff;
    }

    .actions {
      display: none;
      gap: 12px;
      justify-content: center;
    }

    .actions a {
      flex: 1;
      text-decoration: none;
      background: #000;
      color: #fff;
      border: 1px solid #fff;
      padding: 12px;
      font-size: 15px;
      font-weight: bold;
      font-family: "Courier New", Courier, monospace;
      text-transform: uppercase;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      NATGLOBE AVIATION<br>
      ACARS WEATHER
    </div>

    <input
      id="icao"
      class="icao"
      type="text"
      maxlength="4"
      value="EFHK"
      placeholder="EFHK"
      autocapitalize="characters"
      autocorrect="off"
      spellcheck="false"
    >

    <button id="generateBtn" class="btn">Generate Weather</button>

    <div id="status" class="status"></div>

    <div id="actions" class="actions">
      <a id="downloadLink" href="#" download>Download PNG</a>
      <a id="openLink" href="#" target="_blank" rel="noopener">Open PNG</a>
    </div>
  </div>

  <script>
    async function clearOldCaches() {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const reg of regs) {
          await reg.unregister();
        }
      }

      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(key => caches.delete(key)));
      }
    }

    const icaoInput = document.getElementById('icao');
    const generateBtn = document.getElementById('generateBtn');
    const statusEl = document.getElementById('status');
    const actionsEl = document.getElementById('actions');
    const downloadLink = document.getElementById('downloadLink');
    const openLink = document.getElementById('openLink');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function showLinks(icao, blob) {
      const url = URL.createObjectURL(blob);
      downloadLink.href = url;
      downloadLink.download = `${icao}_ACARS_WEATHER.png`;
      openLink.href = url;
      actionsEl.style.display = 'flex';
    }

    async function generateWeather() {
      const icao = icaoInput.value.trim().toUpperCase();

      if (!/^[A-Z]{4}$/.test(icao)) {
        setStatus('INVALID ICAO');
        actionsEl.style.display = 'none';
        return;
      }

      setStatus('FETCHING WEATHER...');
      actionsEl.style.display = 'none';

      try {
        const res = await fetch(`/api/weather-v2?icao=${icao}&t=${Date.now()}`, {
          cache: 'no-store'
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const blob = await res.blob();

        if (!blob || blob.size === 0) {
          throw new Error('EMPTY PNG');
        }

        showLinks(icao, blob);
        setStatus('READY');
      } catch (err) {
        console.error(err);
        setStatus('ERROR FETCHING WEATHER');
      }
    }

    generateBtn.addEventListener('click', generateWeather);
    icaoInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generateWeather();
    });

    clearOldCaches();
  </script>
</body>
</html>
