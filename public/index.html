<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NatGlobe ACARS Weather</title>
  <style>
    body {
      margin: 0;
      font-family: "Courier New", monospace;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 700px;
      background: #111;
      border: 1px solid #fff;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 24px;
      color: #c0c0c0;
      text-align: center;
      letter-spacing: 1px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #c0c0c0;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 20px;
      font-family: "Courier New", monospace;
      box-sizing: border-box;
      border: 1px solid #fff;
      background: #000;
      color: #fff;
      text-transform: uppercase;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      font-size: 18px;
      font-family: "Courier New", monospace;
      font-weight: bold;
      border: 1px solid #fff;
      background: #c0c0c0;
      color: #000;
      cursor: pointer;
    }

    button:hover {
      background: #d9d9d9;
    }

    .status {
      margin-top: 16px;
      min-height: 24px;
      font-size: 14px;
      color: #fff;
      white-space: pre-wrap;
    }

    .preview {
      margin-top: 20px;
      text-align: center;
    }

    .preview img {
      max-width: 100%;
      height: auto;
      border: 1px solid #fff;
      background: #fff;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .actions a {
      flex: 1;
      min-width: 160px;
      text-align: center;
      text-decoration: none;
      padding: 12px;
      border: 1px solid #fff;
      background: #000;
      color: #fff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>NATGLOBE AVIATION<br>ACARS WEATHER</h1>

    <label for="icao">AIRPORT ICAO</label>
    <input id="icao" maxlength="4" placeholder="EFHK" value="EFHK" />

    <button id="generateBtn">GENERATE WEATHER PNG</button>

    <div id="status" class="status"></div>

    <div class="actions" id="actions" style="display:none;">
      <a id="downloadLink" href="#" download>DOWNLOAD PNG</a>
      <a id="openLink" href="#" target="_blank" rel="noopener">OPEN PNG</a>
    </div>

    <div class="preview" id="preview"></div>
  </div>

  <script>
    const btn = document.getElementById('generateBtn');
    const input = document.getElementById('icao');
    const statusEl = document.getElementById('status');
    const previewEl = document.getElementById('preview');
    const actionsEl = document.getElementById('actions');
    const downloadLink = document.getElementById('downloadLink');
    const openLink = document.getElementById('openLink');

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function saveLastBlob(icao, blob) {
      const reader = new FileReader();
      reader.onloadend = () => {
        localStorage.setItem(`last_png_${icao}`, reader.result);
      };
      reader.readAsDataURL(blob);
    }

    function showBlob(icao, blob) {
      const url = URL.createObjectURL(blob);

      previewEl.innerHTML = `<img src="${url}" alt="ACARS Weather PNG" />`;
      downloadLink.href = url;
      downloadLink.download = `${icao}_ACARS_WEATHER.png`;
      openLink.href = url;
      actionsEl.style.display = 'flex';
    }

    function showCached(icao) {
      const cached = localStorage.getItem(`last_png_${icao}`);
      if (!cached) {
        setStatus('No saved local report found.');
        return false;
      }

      previewEl.innerHTML = `<img src="${cached}" alt="Saved ACARS Weather PNG" />`;
      downloadLink.href = cached;
      downloadLink.download = `${icao}_ACARS_WEATHER.png`;
      openLink.href = cached;
      actionsEl.style.display = 'flex';
      setStatus('LIVE FETCH FAILED — SHOWING SAVED LOCAL REPORT');
      return true;
    }

    async function generate() {
      const icao = input.value.trim().toUpperCase();
      if (!/^[A-Z]{4}$/.test(icao)) {
        setStatus('Please enter a valid 4-letter ICAO code.');
        return;
      }

      setStatus('Fetching live weather...');
      previewEl.innerHTML = '';
      actionsEl.style.display = 'none';

      try {
        const res = await fetch(`/api/weather?icao=${icao}`, {
          cache: 'no-store'
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const blob = await res.blob();
        if (!blob || blob.size === 0) {
          throw new Error('Empty PNG response');
        }

        showBlob(icao, blob);
        saveLastBlob(icao, blob);
        setStatus('LIVE WEATHER REPORT GENERATED');
      } catch (err) {
        console.error(err);
        const ok = showCached(icao);
        if (!ok) {
          setStatus(`Live fetch failed: ${err.message}`);
        }
      }
    }

    btn.addEventListener('click', generate);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generate();
    });
  </script>
</body>
</html>
