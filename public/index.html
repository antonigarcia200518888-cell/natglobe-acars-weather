<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NatGlobe ACARS Weather v2</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Courier New", monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wrap {
      width: 92%;
      max-width: 720px;
      border: 1px solid #fff;
      padding: 24px;
      box-sizing: border-box;
      background: #111;
    }
    h1 {
      text-align: center;
      color: #c0c0c0;
      margin-top: 0;
      line-height: 1.4;
      font-size: 24px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #c0c0c0;
      font-weight: bold;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      font-size: 20px;
      font-family: "Courier New", monospace;
      background: #000;
      color: #fff;
      border: 1px solid #fff;
      text-transform: uppercase;
    }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      font-size: 18px;
      font-family: "Courier New", monospace;
      font-weight: bold;
      background: #c0c0c0;
      color: #000;
      border: 1px solid #fff;
    }
    .status {
      margin-top: 16px;
      white-space: pre-wrap;
      min-height: 24px;
    }
    .preview {
      margin-top: 20px;
      text-align: center;
    }
    .preview img {
      max-width: 100%;
      border: 1px solid #fff;
      background: #fff;
    }
    .actions {
      margin-top: 16px;
      display: none;
      gap: 12px;
      flex-wrap: wrap;
    }
    .actions a {
      flex: 1;
      min-width: 160px;
      text-align: center;
      text-decoration: none;
      padding: 12px;
      border: 1px solid #fff;
      color: #fff;
      background: #000;
      font-weight: bold;
    }
    .version {
      margin-top: 18px;
      color: #888;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>NATGLOBE AVIATION<br>ACARS WEATHER v2</h1>

    <label for="icao">AIRPORT ICAO</label>
    <input id="icao" maxlength="4" value="EFHK" placeholder="EFHK">

    <button id="generateBtn">GENERATE WEATHER PNG</button>

    <div class="status" id="status"></div>

    <div class="actions" id="actions">
      <a id="downloadLink" href="#" download>DOWNLOAD PNG</a>
      <a id="openLink" href="#" target="_blank" rel="noopener">OPEN PNG</a>
    </div>

    <div class="preview" id="preview"></div>
    <div class="version">Frontend version: v2-force-refresh</div>
  </div>

  <script>
    const btn = document.getElementById('generateBtn');
    const input = document.getElementById('icao');
    const statusEl = document.getElementById('status');
    const previewEl = document.getElementById('preview');
    const actionsEl = document.getElementById('actions');
    const downloadLink = document.getElementById('downloadLink');
    const openLink = document.getElementById('openLink');

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function showBlob(icao, blob) {
      const url = URL.createObjectURL(blob);
      previewEl.innerHTML = `<img src="${url}" alt="ACARS Weather PNG">`;
      downloadLink.href = url;
      downloadLink.download = `${icao}_ACARS_WEATHER.png`;
      openLink.href = url;
      actionsEl.style.display = 'flex';
    }

    async function generate() {
      const icao = input.value.trim().toUpperCase();
      if (!/^[A-Z]{4}$/.test(icao)) {
        setStatus('Please enter a valid 4-letter ICAO code.');
        return;
      }

      setStatus('Fetching live weather...');
      previewEl.innerHTML = '';
      actionsEl.style.display = 'none';

      try {
        const url = `/api/weather-v2?icao=${icao}&t=${Date.now()}`;
        const res = await fetch(url, { cache: 'no-store' });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const blob = await res.blob();
        if (!blob || blob.size === 0) {
          throw new Error('Empty PNG response');
        }

        showBlob(icao, blob);
        setStatus('LIVE WEATHER REPORT GENERATED');
      } catch (err) {
        console.error(err);
        setStatus(`LIVE FETCH FAILED: ${err.message}`);
      }
    }

    btn.addEventListener('click', generate);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generate();
    });
  </script>
</body>
</html>
