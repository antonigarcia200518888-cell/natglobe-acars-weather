<!DOCTYPE html>
<html>
<head>
  <title>ACARS WX</title>
  <style>
    body {
      font-family: "Courier New", monospace;
      background: white;
      color: black;
      padding: 20px;
    }
    input {
      font-family: inherit;
      margin: 5px;
      padding: 4px;
      width: 120px;
    }
    button {
      padding: 6px 12px;
      font-family: inherit;
    }
  </style>
</head>
<body>

<h3>ACARS WX GENERATOR</h3>

<div>
  FLT <input id="flt"><br>
  DEP <input id="dep" maxlength="4">
  ARR <input id="arr" maxlength="4"><br>
  ROUTE <input id="route" style="width:300px"><br>
  RMK <input id="rmk" style="width:300px"><br><br>

  <button onclick="generate()">GENERATE PDF</button>
</div>

<script>
function upper(el) {
  el.value = el.value.toUpperCase().slice(0, 4);
}

document.getElementById("dep").oninput = e => upper(e.target);
document.getElementById("arr").oninput = e => upper(e.target);

async function generate() {
  const data = {
    flt: document.getElementById("flt").value,
    dep: document.getElementById("dep").value,
    arr: document.getElementById("arr").value,
    route: document.getElementById("route").value.toUpperCase(),
    remarks: document.getElementById("rmk").value
  };

  const res = await fetch("/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);
  window.open(url);
}
</script>

</body>
</html>
